services:
  nextcloud:
    image: nextcloud:30.0.6
    container_name: nextcloud
    restart: unless-stopped
    volumes:
      - /srv/personal-cloud/apps/volumes/nextcloud/files:/var/www/html
      - /srv/personal-cloud/apps/volumes/nextcloud/config:/var/www/html/config
      - /srv/personal-cloud/apps/volumes/nextcloud/apps:/var/www/html/apps
      - /srv/personal-cloud/apps/volumes/nextcloud/themes:/var/www/html/themes
    environment:
      POSTGRES_HOST: postgres-nextcloud
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_NEXTCLOUD_PASSWORD}
      REDIS_HOST: redis-nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: drive.kaostech.com.br cloud.kaostech.com.br localhost
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G
    networks:
      - personal-cloud
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  personal-cloud:
    external: true
