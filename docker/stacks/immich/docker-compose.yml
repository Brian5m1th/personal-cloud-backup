services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.130.3
    container_name: immich-server
    restart: unless-stopped
    volumes:
      - /srv/personal-cloud/apps/volumes/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: postgres-immich
      DB_USERNAME: immich
      DB_PASSWORD: ${POSTGRES_IMMICH_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis-immich
      IMMICH_SERVER_URL: http://immich-server:3001
      IMMICH_MACHINE_LEARNING_ENABLED: false
    networks:
      - personal-cloud
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  personal-cloud:
    external: true
